<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Church Ledger</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<div id="app">

    <!-- LOCK SCREEN -->
    <div id="lockScreen" class="screen active">
        <div class="lock-container">
            <h2>Enter PIN</h2>
            <input type="password" id="pinInput" maxlength="6" />
            <button onclick="unlock()">Unlock</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">

        <header>
            <h1 id="orgName">Organisation</h1>
            <button onclick="toggleTheme()">🌙</button>
        </header>

        <div id="dashboard" class="screen active">
            <div class="card balance-card">
                <h2>Total Balance</h2>
                <h1 id="totalBalance">0.00</h1>
            </div>

            <div class="card">
                <p>Income This Month</p>
                <h3 id="monthIncome">0.00</h3>
            </div>

            <div class="card">
                <p>Expense This Month</p>
                <h3 id="monthExpense">0.00</h3>
            </div>
        </div>

        <div id="transactions" class="screen">
            <div id="transactionList"></div>
        </div>

        <div id="settings" class="screen">
            <button onclick="logout()">Logout</button>
        </div>

        <!-- Floating Add Button -->
        <button class="fab" onclick="openAddModal()">+</button>

        <!-- Bottom Nav -->
        <nav>
            <button onclick="navigate('dashboard')">Home</button>
            <button onclick="navigate('transactions')">Transactions</button>
            <button onclick="navigate('settings')">Settings</button>
        </nav>

    </div>

</div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
